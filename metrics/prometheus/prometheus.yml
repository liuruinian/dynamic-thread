# =============================================================================
# Prometheus Configuration for Dynamic Thread Pool
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Dynamic Thread Pool Application (Nacos Example)
  - job_name: 'dynamic-thread-pool'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8081']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'nacos-cloud-example'

  # Dynamic Thread Pool Dashboard Server
  - job_name: 'dynamic-thread-server'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 5s
    static_configs:
      - targets: ['host.docker.internal:8080']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'dynamic-thread-server'
