server:
  port: 8083

spring:
  application:
    name: file-example

# Dynamic Thread Pool Configuration
dynamic-thread:
  enabled: true
  banner: true
  config-file-type: YAML
  # Local file configuration
  file:
    # Path to the thread pool configuration file
    # The file will be watched for changes
    path: config/thread-pool.yaml
    config-type: YAML
    
  # Agent reporting to Dashboard Server
  agent:
    enabled: true
    app-id: ${spring.application.name}
    server:
      host: ${DASHBOARD_HOST:127.0.0.1}
      port: ${DASHBOARD_PORT:9527}
    report:
      interval: 5

# Actuator endpoints for monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    com.dynamic.thread: DEBUG
