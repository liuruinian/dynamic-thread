# =============================================================================
# Nacos Cloud Bootstrap Configuration
# =============================================================================

spring:
  application:
    name: nacos-cloud-example
  cloud:
    nacos:
      config:
        server-addr: ${NACOS_SERVER:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:public}
        file-extension: yaml
        refresh-enabled: true
      discovery:
        enabled: false
