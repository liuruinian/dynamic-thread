server:
  port: 8085

spring:
  application:
    name: etcd-example

# Dynamic Thread Pool Configuration
dynamic-thread:
  enabled: true
  banner: true
  config-file-type: YAML
  # ETCD configuration
  etcd:
    # ETCD server endpoints (comma separated for cluster)
    endpoints: http://localhost:2379
    # Key prefix for thread pool configuration
    key-prefix: /dynamic-thread/config
    # Authentication (optional)
    # username: root
    # password: secret
    # Configuration type
    config-type: YAML

  # Agent reporting to Dashboard Server
  agent:
    enabled: true
    app-id: ${spring.application.name}
    server:
      host: ${DASHBOARD_HOST:127.0.0.1}
      port: ${DASHBOARD_PORT:9527}
    report:
      interval: 5

# Actuator endpoints for monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    com.dynamic.thread: DEBUG
